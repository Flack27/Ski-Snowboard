services:
  pocketbase:
    build: ./pocketbase
    container_name: spapens-pocketbase
    restart: unless-stopped
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY}
      # Lets the PocketBase hook trigger on-demand revalidation of the Next site.
      - REVALIDATE_URL=http://web:3000/api/revalidate
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
    volumes:
      - ./pocketbase/pb_data:/pb/pb_data
      - ./pocketbase/pb_hooks:/pb/pb_hooks
      - ./pocketbase/pb_migrations:/pb/pb_migrations
    ports:
      # LAN access to the admin (8090 is taken by the Josette stack, so 8091 on the host).
      # Public access is via the Cloudflare Tunnel -> beheer.sosoutdoor.nl.
      - "8091:8090"
    networks:
      - spapens

  web:
    build:
      context: ./web
      args:
        # NEXT_PUBLIC_* must be present at BUILD time (baked into the client bundle).
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
        - NEXT_PUBLIC_POCKETBASE_URL=${NEXT_PUBLIC_POCKETBASE_URL}
        - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
        - NEXT_PUBLIC_GOOGLE_PLACE_ID=${NEXT_PUBLIC_GOOGLE_PLACE_ID}
    container_name: spapens-web
    restart: unless-stopped
    depends_on:
      - pocketbase
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_POCKETBASE_URL=${NEXT_PUBLIC_POCKETBASE_URL}
      - POCKETBASE_URL=${POCKETBASE_URL}
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD}
      - MOLLIE_API_KEY=${MOLLIE_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_OWNER=${MAIL_OWNER}
      - REVALIDATE_SECRET=${REVALIDATE_SECRET}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
      - NEXT_PUBLIC_GOOGLE_PLACE_ID=${NEXT_PUBLIC_GOOGLE_PLACE_ID}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    ports:
      # LAN preview (3000 is taken by the Josette stack, so 3001 on the host).
      # Public access is via the Cloudflare Tunnel -> sosoutdoor.nl.
      - "3001:3000"
    networks:
      - spapens

  # Cloudflare Tunnel — the public entrypoint (no router ports opened). Uncomment once the
  # tunnel is created in Cloudflare; put its token in .env (CLOUDFLARE_TUNNEL_TOKEN), then
  # `docker compose up -d`. Configure these public hostnames in the CF dashboard:
  #     sosoutdoor.nl         -> http://web:3000
  #     beheer.sosoutdoor.nl  -> http://pocketbase:8090
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: spapens-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web
      - pocketbase
    networks:
      - spapens

networks:
  spapens:
    driver: bridge
